apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: {{ .Values.redis.port }}
          command: ["/bin/sh", "-c"]
          args:
            - redis-server --requirepass "$$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              value: {{ required "redis.password is required" .Values.redis.password | quote }} 