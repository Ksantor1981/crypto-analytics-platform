# Установка: передайте секреты через свой values-файл или --set.
# Пример локальной проверки шаблонов: helm template . -f values.ci.yaml
# Никогда не коммитьте реальные пароли и URL с кредами.

backend:
  image: crypto-analytics-backend:latest
  port: 8000
  env:
    DATABASE_URL: ""
    REDIS_URL: ""
    ENVIRONMENT: production
    SECRET_KEY: ""

frontend:
  image: crypto-analytics-frontend:latest
  port: 3000
  env:
    NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    NEXT_PUBLIC_ML_URL: http://ml-service:8001/api/v1

mlService:
  image: crypto-analytics-ml-service:latest
  port: 8001
  env:
    DATABASE_URL: ""
    ENVIRONMENT: production

workers:
  image: crypto-analytics-workers:latest
  env:
    DATABASE_URL: ""
    REDIS_URL: ""
    ENVIRONMENT: production
    SECRET_KEY: ""

postgres:
  image: postgres:15
  port: 5432
  env:
    POSTGRES_DB: crypto_analytics
    POSTGRES_USER: crypto_analytics_user
    POSTGRES_PASSWORD: ""

redis:
  image: redis:7-alpine
  port: 6379
  password: ""
