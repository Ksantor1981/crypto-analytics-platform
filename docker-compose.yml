# Локальный стек: Redis с паролем (см. REDIS_PASSWORD / REDIS_URL в .env).
# Не поднимайте profile celery-beat вместе со встроенным asyncio-сбором в backend — двойной опрос Telegram.
#
# Переменные с :-default ниже нужны только чтобы `docker compose config` и подъём без полного .env
# не падали; в проде задайте свои секреты в .env.
#
# Мониторинг (Prometheus + Grafana) — профиль `monitoring` (меньше контейнеров по умолчанию, меньше сбоев Docker Desktop):
#   docker compose --profile monitoring up -d
# Только БД: docker compose -f docker-compose.simple.yml up -d
services:
  postgres:
    image: postgres:15-alpine
    container_name: crypto-analytics-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-crypto_analytics}
      - POSTGRES_USER=${POSTGRES_USER:-crypto_analytics_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"  # local-only dev DBA access
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crypto_analytics_user} -d ${POSTGRES_DB:-crypto_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: crypto-analytics-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-analytics-backend
    environment:
      - USE_ALEMBIC=${USE_ALEMBIC:-true}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=false
      # Непрерывный сбор (сек). Вместе с дедупом fingerprint безопасно чаще опроса
      - COLLECTION_INTERVAL_SECONDS=${COLLECTION_INTERVAL_SECONDS:-180}
      - REDDIT_COLLECTION_INTERVAL_SECONDS=${REDDIT_COLLECTION_INTERVAL_SECONDS:-180}
      - COLLECT_TELEGRAM=${COLLECT_TELEGRAM:-true}
      - COLLECT_REDDIT_IN_RUN_COLLECTION=${COLLECT_REDDIT_IN_RUN_COLLECTION:-true}
      # Не заливать демо-каналы при пустой БД (только реальные/seed-скрипт)
      - AUTO_SEED_DEMO_CHANNELS=${AUTO_SEED_DEMO_CHANNELS:-false}
      # Добавляем ML service URL
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml-service:8001}
      # API Keys для бирж (если нужны)
      - BYBIT_API_KEY=${BYBIT_API_KEY:-}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs  # Логи
    networks:
      - crypto_analytics_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto-analytics-frontend
    environment:
      # Добавляем переменные для подключения к backend
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_ML_API_URL=${NEXT_PUBLIC_ML_API_URL:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy  # Ждем готовности backend
    networks:
      - crypto_analytics_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: crypto-analytics-ml-service
    environment:
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - MODEL_CACHE_ENABLED=${MODEL_CACHE_ENABLED:-true}
      - BACKEND_URL=http://backend:8000
      - OPENAPI_DOCS_ENABLED=${ML_OPENAPI_DOCS_ENABLED:-true}
    ports:
      - "${ML_SERVICE_PORT:-8001}:8001"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models  # Кэш моделей
      - ml_logs:/app/logs      # Логи ML
    networks:
      - crypto_analytics_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Опциональный nginx для production
  nginx:
    image: nginx:alpine
    container_name: crypto-analytics-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
      - ml-service
    networks:
      - crypto_analytics_network
    restart: unless-stopped
    profiles:
      - production  # Запускается только с --profile production

  # Celery worker для торговых задач
  trading-worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-analytics-trading-worker
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - TRADING_ENCRYPTION_KEY=${TRADING_ENCRYPTION_KEY:?Set TRADING_ENCRYPTION_KEY in .env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - trading_worker_logs:/app/logs
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  # Celery для сбора — опционально: в backend уже asyncio-scheduler (см. README).
  # Запуск: docker compose --profile celery-beat up -d  (поднимает beat + worker отдельно)
  celery-collect-beat:
    profiles:
      - celery-beat
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-analytics-celery-beat
    command: celery -A app.celery_worker beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - celery_collect_logs:/app/logs
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  celery-collect-worker:
    profiles:
      - celery-beat
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-analytics-celery-worker
    command: celery -A app.celery_worker worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - celery_collect_logs:/app/logs
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  # Celery worker для сбора сигналов (workers package)
  signal-worker:
    build: 
      context: ./workers
      dockerfile: Dockerfile
    container_name: crypto-analytics-signal-worker
    command: celery -A tasks worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    volumes:
      - ./workers:/app
      - signal_worker_logs:/app/logs
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  prometheus:
    profiles:
      - monitoring
    image: prom/prometheus:v2.47.0
    container_name: crypto-analytics-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  grafana:
    profiles:
      - monitoring
    image: grafana/grafana:10.2.0
    container_name: crypto-analytics-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-grafana_admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env for monitoring profile}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3001}
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana-dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - crypto_analytics_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  trading_worker_logs:
  signal_worker_logs:
  celery_collect_logs:
  ml_models:
  ml_logs:
  prometheus_data:
  grafana_data:

networks:
  crypto_analytics_network:
    driver: bridge