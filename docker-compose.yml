services:
  postgres:
    image: postgres:15-alpine
    container_name: crypto-analytics-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-crypto_analytics}
      - POSTGRES_USER=${POSTGRES_USER:-crypto_analytics_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    ports:
      - "${POSTGRES_PORT:-5432}:5432"  # –ù–∞—Å—Ç—Ä–∞–∏–≤–∞–µ–º—ã–π –ø–æ—Ä—Ç
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crypto_analytics_user} -d ${POSTGRES_DB:-crypto_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: crypto-analytics-redis
    command: redis-server
    ports:
      - "${REDIS_PORT:-6379}:6379"  # –ù–∞—Å—Ç—Ä–∞–∏–≤–∞–µ–º—ã–π –ø–æ—Ä—Ç
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-analytics-backend
    environment:
      - USE_ALEMBIC=${USE_ALEMBIC:-true}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=false
      # –ù–µ–ø—Ä–µ—Ä—ã–≤–Ω—ã–π —Å–±–æ—Ä (—Å–µ–∫). –í–º–µ—Å—Ç–µ —Å –¥–µ–¥—É–ø–æ–º fingerprint –±–µ–∑–æ–ø–∞—Å–Ω–æ —á–∞—â–µ –æ–ø—Ä–æ—Å–∞
      - COLLECTION_INTERVAL_SECONDS=${COLLECTION_INTERVAL_SECONDS:-180}
      - REDDIT_COLLECTION_INTERVAL_SECONDS=${REDDIT_COLLECTION_INTERVAL_SECONDS:-180}
      - COLLECT_TELEGRAM=${COLLECT_TELEGRAM:-true}
      - COLLECT_REDDIT_IN_RUN_COLLECTION=${COLLECT_REDDIT_IN_RUN_COLLECTION:-true}
      # –ù–µ –∑–∞–ª–∏–≤–∞—Ç—å –¥–µ–º–æ-–∫–∞–Ω–∞–ª—ã –ø—Ä–∏ –ø—É—Å—Ç–æ–π –ë–î (—Ç–æ–ª—å–∫–æ —Ä–µ–∞–ª—å–Ω—ã–µ/seed-—Å–∫—Ä–∏–ø—Ç)
      - AUTO_SEED_DEMO_CHANNELS=${AUTO_SEED_DEMO_CHANNELS:-false}
      # –î–æ–±–∞–≤–ª—è–µ–º ML service URL
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml-service:8001}
      # API Keys –¥–ª—è –±–∏—Ä–∂ (–µ—Å–ª–∏ –Ω—É–∂–Ω—ã)
      - BYBIT_API_KEY=${BYBIT_API_KEY:-}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs  # –õ–æ–≥–∏
    networks:
      - crypto_analytics_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto-analytics-frontend
    environment:
      # –î–æ–±–∞–≤–ª—è–µ–º –ø–µ—Ä–µ–º–µ–Ω–Ω—ã–µ –¥–ª—è –ø–æ–¥–∫–ª—é—á–µ–Ω–∏—è –∫ backend
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_ML_API_URL=${NEXT_PUBLIC_ML_API_URL:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy  # –ñ–¥–µ–º –≥–æ—Ç–æ–≤–Ω–æ—Å—Ç–∏ backend
    networks:
      - crypto_analytics_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: crypto-analytics-ml-service
    environment:
      - REDIS_URL=${REDIS_URL}
      - MODEL_CACHE_ENABLED=${MODEL_CACHE_ENABLED:-true}
      - BACKEND_URL=http://backend:8000
    ports:
      - "${ML_SERVICE_PORT:-8001}:8001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models  # –ö—ç—à –º–æ–¥–µ–ª–µ–π
      - ml_logs:/app/logs      # –õ–æ–≥–∏ ML
    networks:
      - crypto_analytics_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # –û–ø—Ü–∏–æ–Ω–∞–ª—å–Ω—ã–π nginx –¥–ª—è production
  nginx:
    image: nginx:alpine
    container_name: crypto-analytics-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
      - ml-service
    networks:
      - crypto_analytics_network
    restart: unless-stopped
    profiles:
      - production  # –ó–∞–ø—É—Å–∫–∞–µ—Ç—Å—è —Ç–æ–ª—å–∫–æ —Å --profile production

  # Celery worker –¥–ª—è —Ç–æ—Ä–≥–æ–≤—ã—Ö –∑–∞–¥–∞—á
  trading-worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-analytics-trading-worker
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - TRADING_ENCRYPTION_KEY=${TRADING_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - trading_worker_logs:/app/logs
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  # Celery beat –¥–ª—è —Å–±–æ—Ä–∞ ‚Äî –æ–ø—Ü–∏–æ–Ω–∞–ª—å–Ω–æ: –≤ backend —É–∂–µ asyncio-scheduler (—Å–º. README).
  # –ó–∞–ø—É—Å–∫: docker compose --profile celery-beat up -d
  celery-collect:
    profiles:
      - celery-beat
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-analytics-celery-collect
    command: celery -A app.celery_worker worker --beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - celery_collect_logs:/app/logs
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  # Celery worker –¥–ª—è —Å–±–æ—Ä–∞ —Å–∏–≥–Ω–∞–ª–æ–≤ (workers package)
  signal-worker:
    build: 
      context: ./workers
      dockerfile: Dockerfile
    container_name: crypto-analytics-signal-worker
    command: celery -A tasks worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    volumes:
      - ./workers:/app
      - signal_worker_logs:/app/logs
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: crypto-analytics-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - crypto_analytics_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: crypto-analytics-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3001}
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana-dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - crypto_analytics_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  trading_worker_logs:
  signal_worker_logs:
  celery_collect_logs:
  ml_models:
  ml_logs:
  worker_logs:
  prometheus_data:
  grafana_data:

networks:
  crypto_analytics_network:
    driver: bridge