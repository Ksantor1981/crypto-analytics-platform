name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "bcrypt==4.0.1" pytest-cov structlog
      - name: Lint
        run: python -m py_compile app/main.py && echo "Syntax OK"
      - name: Run tests with coverage
        env:
          USE_SQLITE: "true"
          SECRET_KEY: "ci-test-secret-key-32-chars-minimum"
          DEBUG: "true"
        run: |
          python -m pytest tests/ --ignore=tests/test_z_production_integration.py -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=25

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint
        run: npx next lint || true
      - name: Build
        run: npx next build

  ml-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check model loading
        run: python -c "from models.trained_predictor import predict_signal_success; print('ML model OK')"
      - name: Check training script
        run: python -c "from train_from_db import train; print('Train script OK')"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets
        run: |
          ! grep -rn "sk_test_\|sk_live_\|password.*=.*\"[A-Z]" --include="*.py" . | grep -v ".git/" | grep -v "description\|Field\|getenv\|environ" || echo "No secrets found ✅"
      - name: Check for session files
        run: |
          ! find . -name "*.session" -not -path "./.git/*" | grep . || echo "No session files ✅"
